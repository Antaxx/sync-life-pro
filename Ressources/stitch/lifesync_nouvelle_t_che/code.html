<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#196b3e",
                        "background-light": "#f6f8f7",
                        "background-dark": "#131f18",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Outfit', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-200 font-display">
<!-- Dark Overlay -->
<div class="fixed inset-0 bg-background-dark/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
<!-- Task Creation Modal -->
<div class="bg-white dark:bg-background-dark w-full max-w-[560px] rounded-[20px] shadow-2xl overflow-hidden flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between px-8 py-6 border-b border-slate-100 dark:border-white/10">
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Nouvelle tâche</h2>
<button class="size-10 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-white/10 dark:hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-[20px]">close</span>
</button>
</header>
<!-- Modal Content -->
<div class="p-8 space-y-8 overflow-y-auto custom-scrollbar max-h-[80vh]">
<!-- Large Title Input -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Titre de la tâche</label>
<input class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-2xl p-5 text-xl font-medium text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 outline-none transition-all" placeholder="Qu'avez-vous en tête ?" type="text"/>
</div>
<!-- Urgency Pills -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Urgence</label>
<div class="flex gap-3">
<button class="px-6 py-2.5 rounded-full bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">Faible</button>
<button class="px-6 py-2.5 rounded-full bg-primary text-white font-medium shadow-lg shadow-primary/20">Moyenne</button>
<button class="px-6 py-2.5 rounded-full bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">Élevée</button>
</div>
</div>
<!-- Importance Pills -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Importance</label>
<div class="flex gap-3">
<button class="px-6 py-2.5 rounded-full bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-slate-300 font-medium">Mineure</button>
<button class="px-6 py-2.5 rounded-full bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-slate-300 font-medium">Standard</button>
<button class="px-6 py-2.5 rounded-full bg-primary text-white font-medium shadow-lg shadow-primary/20">Critique</button>
</div>
</div>
<!-- State of Mind (Flame, Zap, Coffee) -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-500 uppercase tracking-wider">État d'esprit requis</label>
<div class="grid grid-cols-3 gap-4">
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-slate-100 dark:bg-white/5 border-2 border-transparent hover:border-primary/30 transition-all group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary mb-2">local_fire_department</span>
<span class="text-xs font-bold text-slate-600 dark:text-slate-400">Focus intense</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-primary text-white border-2 border-primary shadow-lg shadow-primary/20">
<span class="material-symbols-outlined mb-2">bolt</span>
<span class="text-xs font-bold">Productivité</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-slate-100 dark:bg-white/5 border-2 border-transparent hover:border-primary/30 transition-all group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary mb-2">coffee</span>
<span class="text-xs font-bold text-slate-600 dark:text-slate-400">Détente</span>
</button>
</div>
</div>
<!-- Bottom 2 Columns -->
<div class="grid grid-cols-2 gap-6 pt-4">
<!-- Left Column: Dropdowns -->
<div class="space-y-4">
<div class="space-y-2">
<label class="text-xs font-bold text-slate-400 uppercase">Bucket</label>
<div class="relative">
<select class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 appearance-none text-slate-700 dark:text-slate-300 focus:ring-primary focus:border-primary transition-all">
<option>Travail</option>
<option>Personnel</option>
<option>Santé</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-slate-400 uppercase">Projet</label>
<div class="relative">
<select class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 appearance-none text-slate-700 dark:text-slate-300 focus:ring-primary focus:border-primary transition-all">
<option>Refonte Site Web</option>
<option>App Mobile</option>
<option>Aucun</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Right Column: Date/Time Picker -->
<div class="space-y-4">
<div class="space-y-2">
<label class="text-xs font-bold text-slate-400 uppercase">Date d'échéance</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-700 dark:text-slate-300 focus:ring-primary focus:border-primary transition-all" type="date"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-slate-400 uppercase">Heure</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-700 dark:text-slate-300 focus:ring-primary focus:border-primary transition-all" type="time"/>
</div>
</div>
</div>
</div>
</div>
<!-- Footer Action -->
<footer class="p-8 bg-slate-50 dark:bg-white/5 mt-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-3 shadow-xl shadow-primary/20 transition-all transform active:scale-[0.98]">
                    Créer la tâche
                    <span class="material-symbols-outlined">add</span>
</button>
</footer>
</div>
</div>
<!-- Background Content (Simulated Main App) -->
<div class="min-h-screen p-10 bg-background-light">
<div class="max-w-5xl mx-auto flex flex-col gap-10 opacity-20 pointer-events-none grayscale">
<div class="flex items-center justify-between">
<h1 class="text-4xl font-black text-slate-900">LifeSync</h1>
<div class="size-12 rounded-full bg-slate-300"></div>
</div>
<div class="grid grid-cols-3 gap-6">
<div class="h-40 bg-white rounded-3xl"></div>
<div class="h-40 bg-white rounded-3xl"></div>
<div class="h-40 bg-white rounded-3xl"></div>
</div>
<div class="space-y-4">
<div class="h-20 bg-white rounded-2xl w-full"></div>
<div class="h-20 bg-white rounded-2xl w-full"></div>
<div class="h-20 bg-white rounded-2xl w-full"></div>
<div class="h-20 bg-white rounded-2xl w-full"></div>
</div>
</div>
</div>
</body></html>
