<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LifeSync - Nouvelle Tâche</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a6b3a",
                        "background-light": "#f6f8f7",
                        "background-dark": "#131f18",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-0"></div>
<!-- Bottom Sheet Container -->
<div class="fixed inset-x-0 bottom-0 z-10 flex flex-col items-center">
<div class="w-full max-w-lg bg-white dark:bg-background-dark rounded-t-xl shadow-2xl overflow-hidden">
<!-- BottomSheetHandle -->
<div class="flex h-6 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<div class="px-6 pb-8 pt-2">
<!-- Header -->
<div class="flex items-center justify-between mb-6">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight">Nouvelle tâche</h1>
<button class="text-slate-400 hover:text-slate-600">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Title Input -->
<div class="mb-6">
<input class="w-full h-14 px-5 rounded-xl border-none bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 transition-all" placeholder="Qu'y a-t-il à faire ?" type="text"/>
</div>
<!-- Urgency Selector -->
<div class="mb-6">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold mb-3">Urgence</p>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2 rounded-full text-sm font-medium bg-primary text-white">Urgent</button>
<button class="px-5 py-2 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200">Pas urgent</button>
<button class="px-5 py-2 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200">Habitude</button>
</div>
</div>
<!-- Importance Selector -->
<div class="mb-6">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold mb-3">Importance</p>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400">Important</button>
<button class="px-5 py-2 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400">Pas important</button>
<button class="px-5 py-2 flex items-center gap-2 rounded-full text-sm font-medium bg-primary text-white">
<span class="material-symbols-outlined text-[18px]" data-icon="star">star</span>
                            MTN
                        </button>
</div>
</div>
<!-- State of Mind -->
<div class="mb-6">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold mb-3">État d'esprit requis</p>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border-2 border-transparent transition-all">
<span class="material-symbols-outlined mb-1" data-icon="local_fire_department">local_fire_department</span>
<span class="text-xs font-medium">Focus</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-primary text-white border-2 border-primary transition-all">
<span class="material-symbols-outlined mb-1" data-icon="bolt">bolt</span>
<span class="text-xs font-medium">Énergie</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border-2 border-transparent transition-all">
<span class="material-symbols-outlined mb-1" data-icon="coffee">coffee</span>
<span class="text-xs font-medium">Détendu</span>
</button>
</div>
</div>
<!-- Bucket and Project -->
<div class="grid grid-cols-2 gap-4 mb-6">
<div class="space-y-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Life Bucket</p>
<div class="relative">
<select class="w-full h-11 pl-4 pr-10 rounded-xl bg-slate-100 dark:bg-slate-800 border-none text-slate-900 dark:text-slate-100 text-sm appearance-none focus:ring-2 focus:ring-primary/50">
<option>Travail</option>
<option>Personnel</option>
<option>Santé</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-2.5 text-slate-400 pointer-events-none text-[20px]">expand_more</span>
</div>
</div>
<div class="space-y-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Projet</p>
<div class="relative">
<select class="w-full h-11 pl-4 pr-10 rounded-xl bg-slate-100 dark:bg-slate-800 border-none text-slate-900 dark:text-slate-100 text-sm appearance-none focus:ring-2 focus:ring-primary/50">
<option>Refonte UI</option>
<option>Marketing Q4</option>
<option>Aucun</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-2.5 text-slate-400 pointer-events-none text-[20px]">expand_more</span>
</div>
</div>
</div>
<!-- Date and Time -->
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="space-y-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Date</p>
<div class="relative">
<input class="w-full h-11 pl-4 pr-4 rounded-xl bg-slate-100 dark:bg-slate-800 border-none text-slate-900 dark:text-slate-100 text-sm focus:ring-2 focus:ring-primary/50" type="date"/>
</div>
</div>
<div class="space-y-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Heure</p>
<div class="relative">
<input class="w-full h-11 pl-4 pr-4 rounded-xl bg-slate-100 dark:bg-slate-800 border-none text-slate-900 dark:text-slate-100 text-sm focus:ring-2 focus:ring-primary/50" type="time"/>
</div>
</div>
</div>
<!-- Create Button -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-full shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                    Créer la tâche
                </button>
</div>
</div>
</div>
</body></html>
